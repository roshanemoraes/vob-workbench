openapi: 3.0.3
info:
  title: VOB Workbench API
  version: 0.0.1
  description: Authentication and patient intake API for the VOB Workbench backend.
servers:
  - url: http://localhost:8080
    description: Local backend
tags:
  - name: Auth
    description: Login, token refresh, logout, and current-user endpoints.
  - name: Patients
    description: Front desk patient intake and patient lookup.
  - name: VOB Requests
    description: VOB request creation and queued worklist.
  - name: Admin Users
    description: Planned admin-only user-management endpoints.
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in and receive a JWT access token and refresh token.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                summary: Admin login
                value:
                  username: admin
                  password: admin123
              frontDesk:
                summary: Front desk operator login
                value:
                  username: frontdesk
                  password: frontdesk123
              specialist:
                summary: Specialist login
                value:
                  username: specialist
                  password: specialist123
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid username or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate a refresh token and receive a new token pair.
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing, invalid, expired, or revoked refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke a refresh token.
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: Refresh token revoked if it existed.
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Return the currently authenticated user.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/patients:
    post:
      tags:
        - Patients
      summary: Create a patient during front desk intake.
      operationId: createPatient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
            example:
              mrn: MRN-10001
              firstName: Jane
              lastName: Doe
              dateOfBirth: '1990-04-10'
              gender: FEMALE
              phone: '555-123-4567'
      responses:
        '201':
          description: Patient created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks PATIENT_CREATE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Patient MRN already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      tags:
        - Patients
      summary: List patients using cursor-based pagination.
      operationId: listPatients
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          description: Opaque cursor returned from the previous page.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of records to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Patient page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks PATIENT_VIEW.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/patients/{id}:
    get:
      tags:
        - Patients
      summary: Get a patient by id.
      operationId: getPatientById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 6682df563cc7f568fbf16210
      responses:
        '200':
          description: Patient returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks PATIENT_VIEW.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Patient not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/vob:
    get:
      tags:
        - VOB Requests
      summary: List VOB requests by status using cursor-based pagination.
      operationId: listVobsByStatus
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: true
          description: VOB status to filter by.
          schema:
            $ref: '#/components/schemas/VobStatus'
        - name: cursor
          in: query
          required: false
          description: Opaque cursor returned from the previous page.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of VOB requests to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortOrder
          in: query
          required: false
          description: Sort direction for createdAt and id.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: VOB page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobQueuePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks VOB_QUEUE_VIEW.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - VOB Requests
      summary: Create a VOB request for an existing patient.
      operationId: createVob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VobRequestDTO'
            example:
              patientId: 6682df563cc7f568fbf16210
              insurance:
                payerName: Acme Health
                memberId: MEM-12345
                groupNumber: GRP-100
                planType: PPO
                relationshipToSubscriber: SELF
                coverageStart: '2026-01-01'
                coverageEnd: '2026-12-31'
              dateOfService: '2026-07-10'
              priority: ROUTINE
      responses:
        '201':
          description: VOB request created and queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks VOB_CREATE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Patient not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/vob/{id}:
    get:
      tags:
        - VOB Requests
      summary: Get a VOB request by id.
      operationId: getVobById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 6682df563cc7f568fbf16220
      responses:
        '200':
          description: VOB request returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobResponseDTO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks access to this VOB request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: VOB request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/vob/{id}/claim:
    post:
      tags:
        - VOB Requests
      summary: Claim a queued VOB for processing.
      description: Atomically changes a VOB from QUEUED to IN_PROGRESS and assigns it to the current user.
      operationId: claimVobForProcessing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 6682df563cc7f568fbf16220
      responses:
        '200':
          description: VOB claimed and assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobResponseDTO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks VOB_CLAIM.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: VOB request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: VOB is not queued or was already claimed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/vob/{id}/verify-api:
    post:
      tags:
        - VOB Requests
      summary: Verify an in-progress VOB through the mocked eligibility API.
      operationId: verifyVobUsingApi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 6682df563cc7f568fbf16220
      responses:
        '200':
          description: VOB verification completed by API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobResponseDTO'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not assigned to this VOB or lacks VOB_VERIFY_API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: VOB request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: VOB is not in IN_PROGRESS status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: Eligibility API is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/vob/{id}/verify-manual:
    post:
      tags:
        - VOB Requests
      summary: Verify an in-progress VOB manually.
      operationId: verifyVobManually
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 6682df563cc7f568fbf16220
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualVerificationRequestDTO'
            example:
              result: VERIFIED
              coverageActive: true
              networkStatus: IN_NETWORK
              copay: 25.00
              coinsurancePercent: 20.00
              deductibleTotal: 1500.00
              deductibleMet: 500.00
              oopMax: 6000.00
              oopMet: 1250.00
              notes: Confirmed active coverage by payer portal.
              referenceNumber: ABC-123
      responses:
        '200':
          description: Manual verification completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VobResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User is not assigned to this VOB or lacks VOB_VERIFY_MANUAL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: VOB request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: VOB is not in IN_PROGRESS status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/admin/users:
    get:
      tags:
        - Admin Users
      summary: List users.
      description: Planned endpoint. Requires USER_MANAGE permission.
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks USER_MANAGE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - Admin Users
      summary: Create a user.
      description: Planned endpoint. Requires USER_MANAGE permission.
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks USER_MANAGE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/admin/users/{id}/role:
    patch:
      tags:
        - Admin Users
      summary: Change a user's role.
      description: Planned endpoint. Requires USER_MANAGE permission.
      operationId: updateUserRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleRequest'
      responses:
        '200':
          description: User role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks USER_MANAGE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/admin/users/{id}/status:
    patch:
      tags:
        - Admin Users
      summary: Enable or disable a user.
      description: Planned endpoint. Requires USER_MANAGE permission.
      operationId: updateUserStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserStatusRequest'
      responses:
        '200':
          description: User status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Authenticated user lacks USER_MANAGE.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 6682df563cc7f568fbf16210
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          example: specialist
        password:
          type: string
          minLength: 1
          format: password
          example: specialist123
    AuthResponse:
      type: object
      required:
        - tokenType
        - accessToken
        - refreshToken
        - expiresAt
        - refreshExpiresAt
        - user
      properties:
        tokenType:
          type: string
          example: Bearer
        accessToken:
          type: string
          description: JWT access token to send as an Authorization Bearer token.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
        refreshToken:
          type: string
          description: Opaque refresh token. Store securely and exchange only with the refresh endpoint.
          example: F7c-NyGWZ-TQ2mleUECJjUAliFGar-F5b1hFGw8TZOw
        expiresAt:
          type: string
          format: date-time
          example: '2026-06-30T14:30:00Z'
        refreshExpiresAt:
          type: string
          format: date-time
          example: '2026-07-07T14:30:00Z'
        user:
          $ref: '#/components/schemas/UserSummary'
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
          example: F7c-NyGWZ-TQ2mleUECJjUAliFGar-F5b1hFGw8TZOw
    CurrentUserResponse:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      required:
        - id
        - username
        - role
        - permissions
      properties:
        id:
          type: string
          example: 6682df563cc7f568fbf16210
        username:
          type: string
          example: specialist
        role:
          $ref: '#/components/schemas/AppRole'
        permissions:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Permission'
    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          minLength: 1
          example: new.specialist
        password:
          type: string
          format: password
          minLength: 8
          description: Must satisfy the configured password policy.
          example: Specialist123
        role:
          $ref: '#/components/schemas/AppRole'
    UpdateUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          $ref: '#/components/schemas/AppRole'
    UpdateUserStatusRequest:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          example: true
    CreatePatientRequest:
      type: object
      required:
        - mrn
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - phone
      properties:
        mrn:
          type: string
          minLength: 1
          example: MRN-10001
        firstName:
          type: string
          minLength: 1
          example: Jane
        lastName:
          type: string
          minLength: 1
          example: Doe
        dateOfBirth:
          type: string
          format: date
          example: '1990-04-10'
        gender:
          $ref: '#/components/schemas/Gender'
        phone:
          type: string
          minLength: 1
          example: '555-123-4567'
    PatientResponse:
      type: object
      required:
        - id
        - mrn
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - phone
        - createdByUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: 6682df563cc7f568fbf16210
        mrn:
          type: string
          example: MRN-10001
        firstName:
          type: string
          example: Jane
        lastName:
          type: string
          example: Doe
        dateOfBirth:
          type: string
          format: date
          example: '1990-04-10'
        gender:
          $ref: '#/components/schemas/Gender'
        phone:
          type: string
          example: '555-123-4567'
        createdByUserId:
          type: string
          example: 6682df563cc7f568fbf11111
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PatientPageResponse:
      type: object
      required:
        - items
        - hasNext
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PatientResponse'
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page. Built from createdAt and id, but clients should not parse it.
        hasNext:
          type: boolean
          example: true
    VobRequestDTO:
      type: object
      required:
        - patientId
        - insurance
        - dateOfService
        - priority
      properties:
        patientId:
          type: string
          minLength: 1
          example: 6682df563cc7f568fbf16210
        insurance:
          $ref: '#/components/schemas/InsurancePolicyRequest'
        dateOfService:
          type: string
          format: date
          example: '2026-07-10'
        priority:
          $ref: '#/components/schemas/VobPriority'
    InsurancePolicyRequest:
      type: object
      required:
        - payerName
        - memberId
        - relationshipToSubscriber
      properties:
        payerName:
          type: string
          minLength: 1
          example: Acme Health
        memberId:
          type: string
          minLength: 1
          example: MEM-12345
        groupNumber:
          type: string
          example: GRP-100
        planType:
          type: string
          example: PPO
        relationshipToSubscriber:
          $ref: '#/components/schemas/RelationshipToSubscriber'
        coverageStart:
          type: string
          format: date
          example: '2026-01-01'
        coverageEnd:
          type: string
          format: date
          example: '2026-12-31'
    InsurancePolicyResponse:
      allOf:
        - $ref: '#/components/schemas/InsurancePolicyRequest'
    EligibilityResultResponse:
      type: object
      properties:
        coverageActive:
          type: boolean
          nullable: true
          example: true
        networkStatus:
          $ref: '#/components/schemas/NetworkStatus'
        copay:
          type: number
          nullable: true
          example: 25.00
        coinsurancePercent:
          type: number
          nullable: true
          example: 20.00
        deductibleTotal:
          type: number
          nullable: true
          example: 1500.00
        deductibleMet:
          type: number
          nullable: true
          example: 500.00
        oopMax:
          type: number
          nullable: true
          example: 6000.00
        oopMet:
          type: number
          nullable: true
          example: 1250.00
        notes:
          type: string
          nullable: true
          example: Coverage confirmed through payer portal.
        referenceNumber:
          type: string
          nullable: true
          example: ABC-123
        failureReason:
          type: string
          nullable: true
          example: Coverage could not be verified by API.
        verifiedByUserId:
          type: string
          nullable: true
          example: 6682df563cc7f568fbf22222
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        verificationMethod:
          $ref: '#/components/schemas/VerificationMethod'
    ManualVerificationRequestDTO:
      type: object
      required:
        - result
      properties:
        result:
          type: string
          enum:
            - VERIFIED
            - FAILED_TO_VERIFY
        coverageActive:
          type: boolean
          nullable: true
          example: true
        networkStatus:
          $ref: '#/components/schemas/NetworkStatus'
        copay:
          type: number
          nullable: true
          example: 25.00
        coinsurancePercent:
          type: number
          nullable: true
          example: 20.00
        deductibleTotal:
          type: number
          nullable: true
          example: 1500.00
        deductibleMet:
          type: number
          nullable: true
          example: 500.00
        oopMax:
          type: number
          nullable: true
          example: 6000.00
        oopMet:
          type: number
          nullable: true
          example: 1250.00
        notes:
          type: string
          nullable: true
          example: Confirmed active coverage by payer portal.
        referenceNumber:
          type: string
          nullable: true
          example: ABC-123
        failureReason:
          type: string
          nullable: true
          example: Payer portal unavailable and phone verification failed.
    VobResponseDTO:
      type: object
      required:
        - id
        - patientId
        - insurance
        - dateOfService
        - priority
        - status
        - createdByUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: 6682df563cc7f568fbf16220
        patientId:
          type: string
          example: 6682df563cc7f568fbf16210
        insurance:
          $ref: '#/components/schemas/InsurancePolicyResponse'
        dateOfService:
          type: string
          format: date
          example: '2026-07-10'
        priority:
          $ref: '#/components/schemas/VobPriority'
        status:
          $ref: '#/components/schemas/VobStatus'
        assignedToUserId:
          type: string
          nullable: true
          example: null
        eligibilityResult:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EligibilityResultResponse'
        createdByUserId:
          type: string
          example: 6682df563cc7f568fbf11111
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VobQueuePageResponse:
      type: object
      required:
        - items
        - hasNext
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VobResponseDTO'
        nextCursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page. Built from createdAt and id, but clients should not parse it.
        hasNext:
          type: boolean
          example: true
    AppRole:
      type: string
      enum:
        - ADMIN
        - FRONT_DESK_OPERATOR
        - SPECIALIST
    Permission:
      type: string
      enum:
        - PATIENT_CREATE
        - PATIENT_VIEW
        - VOB_CREATE
        - VOB_VIEW_OWN
        - VOB_QUEUE_VIEW
        - VOB_CLAIM
        - VOB_VERIFY_API
        - VOB_VERIFY_MANUAL
        - VOB_COMPLETE
        - VOB_ASSIGN
        - DASHBOARD_VIEW
        - AUDIT_VIEW
        - USER_MANAGE
    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
        - OTHER
        - UNKNOWN
    RelationshipToSubscriber:
      type: string
      enum:
        - SELF
        - SPOUSE
        - CHILD
        - OTHER
    NetworkStatus:
      type: string
      enum:
        - IN_NETWORK
        - OUT_OF_NETWORK
        - UNKNOWN
    VerificationMethod:
      type: string
      enum:
        - API
        - MANUAL
    VobPriority:
      type: string
      enum:
        - ROUTINE
        - URGENT
    VobStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - VERIFIED
        - FAILED_TO_VERIFY
    ApiError:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Request validation failed
        path:
          type: string
          example: /api/patients
